name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  actions: read

jobs:
  # Runs on GitHub-hosted runners so the workflow never sits "waiting for a runner"
  # when no self-hosted runner is registered for this repository.
  self-hosted-runner-guard:
    runs-on: ubuntu-latest
    outputs:
      self_hosted_available: ${{ steps.guard.outputs.self_hosted_available }}
    steps:
      - name: Check for an online self-hosted runner (repo scope)
        id: guard
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          def write_output(name: str, value: str) -> None:
              path = os.environ.get("GITHUB_OUTPUT", "")
              if not path:
                  print("::error::GITHUB_OUTPUT is not set; cannot publish step outputs.", file=sys.stderr)
                  raise SystemExit(2)
              with open(path, "a", encoding="utf-8") as f:
                  f.write(f"{name}={value}\n")

          token = os.environ.get("GITHUB_TOKEN", "")
          repo = os.environ.get("GH_REPO", "")
          if not token or not repo:
              write_output("self_hosted_available", "false")
              print(
                  "::error::Missing GITHUB_TOKEN or GH_REPO; cannot evaluate self-hosted runners. "
                  "Skipping self-hosted jobs.",
                  file=sys.stderr,
              )
              raise SystemExit(0)

          owner, name = repo.split("/", 1)
          base = f"https://api.github.com/repos/{urllib.parse.quote(owner)}/{urllib.parse.quote(name)}/actions/runners"

          def get_json(url: str) -> dict:
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "rust-xhb-benchmarking-ci-guard",
                  },
                  method="GET",
              )
              try:
                  with urllib.request.urlopen(req) as resp:  # noqa: S310 (stdlib only)
                      return json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"HTTP {e.code} for {url}: {body}") from e

          try:
              page = 1
              per_page = 100
              online_self_hosted = 0
              while True:
                  url = f"{base}?per_page={per_page}&page={page}"
                  data = get_json(url)
                  runners = data.get("runners") or []
                  for r in runners:
                      labels = {str(l.get("name", "")) for l in (r.get("labels") or [])}
                      if "self-hosted" in labels and r.get("status") == "online":
                          online_self_hosted += 1
                  if len(runners) < per_page:
                      break
                  page += 1

              available = online_self_hosted > 0
              write_output("self_hosted_available", "true" if available else "false")
              if available:
                  print(
                      f"::notice::Self-hosted runner pool looks usable (online runners with label self-hosted: {online_self_hosted})."
                  )
              else:
                  print(
                      "::notice::No online self-hosted runners found for this repository (label: self-hosted). "
                      "Skipping self-hosted benchmark jobs to avoid an indefinitely queued workflow. "
                      "Register a self-hosted runner for this repo (or org) to enable CI benchmarks."
                  )
          except Exception as e:  # noqa: BLE001 (best-effort guard)
              # Fork PRs / restricted tokens can make this API unavailable. Prefer skipping
              # self-hosted jobs over failing CI or leaving jobs queued forever.
              write_output("self_hosted_available", "false")
              print(
                  "::notice::Could not query self-hosted runners via GitHub API; skipping self-hosted jobs. "
                  f"Reason: {e}"
              )
          PY

  detect-xharbour:
    needs: [self-hosted-runner-guard]
    if: needs.self-hosted-runner-guard.outputs.self_hosted_available == 'true'
    runs-on: self-hosted
    outputs:
      xhb_available: ${{ steps.detect.outputs.xhb_available }}
    steps:
      - name: Detect xHarbour toolchain (hbmk2)
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if command -v hbmk2 >/dev/null 2>&1; then
            echo "xhb_available=true" >> "$GITHUB_OUTPUT"
            echo "::notice::xHarbour toolchain detected (hbmk2=$(command -v hbmk2)). CI will run Rust + xHarbour benchmarks."
          else
            echo "xhb_available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::xHarbour toolchain NOT detected (hbmk2 missing). Skipping benchmarks because Rust would have nothing to compare against. Install xHarbour on this self-hosted runner so hbmk2 is on PATH."
          fi

  benchmark-both:
    needs: [self-hosted-runner-guard, detect-xharbour]
    if: |
      needs.self-hosted-runner-guard.outputs.self_hosted_available == 'true' &&
      needs.detect-xharbour.outputs.xhb_available == 'true'
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bench
          POSTGRES_PASSWORD: benchpassword
          POSTGRES_DB: benchmark
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bench -d benchmark"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://bench:benchpassword@127.0.0.1:5432/benchmark
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client (and hyperfine if available)
        run: |
          command -v psql >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y postgresql-client)
          command -v hyperfine >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y hyperfine || true)

      - name: Apply schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/postgres/schema.sql

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Rust (release)
        run: |
          cd rust
          cargo build --release

      - name: Build xHarbour (hbmk2)
        run: |
          chmod +x xharbour/build.sh
          ./xharbour/build.sh

      - name: Correctness (Rust + xHarbour)
        run: |
          chmod +x harness/run.sh xharbour/scripts/clean-workdir.sh xharbour/build.sh
          ./harness/run.sh phases --rows 8000 --postgres-url "$DATABASE_URL"

      - name: Measure (Rust + xHarbour, small)
        run: |
          ./harness/run.sh measure --rows 3000 --postgres-url "$DATABASE_URL" --runs 2 --warmup 1

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench/results/**

  xharbour-missing:
    needs: [self-hosted-runner-guard, detect-xharbour]
    if: |
      needs.self-hosted-runner-guard.outputs.self_hosted_available == 'true' &&
      needs.detect-xharbour.outputs.xhb_available != 'true'
    runs-on: self-hosted
    steps:
      - name: Benchmarks skipped (xHarbour missing)
        shell: bash
        run: |
          echo "::notice::Benchmarks skipped: xHarbour toolchain not installed on this self-hosted runner (hbmk2 missing)."
